name: Update Price Dashboard

on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas playwright
          python -m playwright install --with-deps chromium

      - name: Fetch prices & generate dashboard
        run: python generate_dashboard.py --output docs/index.html

      - name: Commit & push
        run: |
          git config user.name "Price Bot"
          git config user.email "bot@boltsc.com"
          git add docs/ data/ price_history.json monthly_history.json
          git diff --cached --quiet || git commit -m "📊 Update prices $(date +'%Y-%m-%d')"
          git push
